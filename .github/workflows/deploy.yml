name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ═══════════════════════════════════════════════════════════
  # JOB: CONTINUOUS INTEGRATION (CI)
  # Ejecuta en: Push a main, Push a develop, Pull Requests
  # ═══════════════════════════════════════════════════════════
  ci:
    name: CI - Test & Build
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Step 2: Setup Node.js 22
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      # Step 3: Install dependencies (clean install)
      - name: Install dependencies
        run: npm ci
      
      # Step 4: Run tests
      # CRÍTICO: Si falla, el pipeline se detiene aquí
      - name: Run tests
        run: npm test
      
      # Step 5: Run linter
      # CRÍTICO: Si falla, el pipeline se detiene aquí
      - name: Run linter
        run: npm run lint
      
      # Step 6: Build project (TypeScript check + Vite build)
      - name: Build project
        run: npm run build
      
      # Step 7: Upload build artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════
  # JOB: DEPLOY PRODUCTION (CD)
  # Ejecuta solo en: Push a rama main
  # Depende de: CI debe pasar
  # ═══════════════════════════════════════════════════════════
  deploy-production:
    name: CD - Deploy Production
    runs-on: ubuntu-latest
    needs: ci
    if: 
      github.ref == 'refs/heads/main' && 
      github.event_name == 'push'
    environment:
      name: production
      url: https://demo-barber.netlify.app
    
    steps:
      # Step 1: Download build artifacts from CI
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
      
      # Step 2: Deploy to Netlify
      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: ./
          production-branch: main
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Production deploy - ${{ github.event.head_commit.message }}"
          enable-pull-request-comment: true
          enable-commit-comment: true
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  # ═══════════════════════════════════════════════════════════
  # JOB: DEPLOY PREVIEW (Pull Requests)
  # Ejecuta solo en: Pull Requests a main
  # Depende de: CI debe pasar
  # ═══════════════════════════════════════════════════════════
  deploy-preview:
    name: CD - Deploy Preview
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'pull_request'
    environment:
      name: preview
    
    steps:
      # Step 1: Download build artifacts from CI
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
      
      # Step 2: Deploy preview to Netlify
      - name: Deploy preview to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: ./
          production-deploy: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Preview PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
          enable-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
